{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>My Albums</h2>
    <a href="{% url 'album-create' %}" class="btn btn-success">+ New Album</a>
</div>

<div class="row">
    {% for album in albums %}
    <div class="col-md-4 mb-4">
        <div class="card shadow-sm h-100">
            <div class="card-body">
                <h5 class="card-title">{{ album.title }}</h5>
                <p class="card-text text-muted">{{ album.description|truncatewords:15 }}</p>
            </div>
            <div class="card-footer bg-white border-top-0 d-flex justify-content-between">
                <a href="{% url 'album-detail' album.pk %}" class="btn btn-sm btn-outline-primary">View</a>
                <div>
                    <a href="{% url 'album-update' album.pk %}" class="btn btn-sm btn-outline-secondary">Edit</a>
                    <a href="{% url 'album-delete' album.pk %}" class="btn btn-sm btn-outline-danger">Delete</a>
                </div>
            </div>
        </div>
    </div>
    {% empty %}
    <div class="col-12"><div class="alert alert-info">No albums found. Create one!</div></div>
    {% endfor %}
</div>
{% endblock %}
