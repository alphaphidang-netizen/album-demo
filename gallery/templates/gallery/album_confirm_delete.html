{% extends 'gallery/base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card border-danger shadow">
            <div class="card-header bg-danger text-white border-bottom-0 pb-3">
                <h4 class="mb-0 mt-2">Confirm Deletion</h4>
            </div>
            <div class="card-body p-4 text-center">
                
                <p class="lead mb-4">
                    Are you sure you want to permanently delete the album 
                    <strong>"{{ object.title }}"</strong>?
                </p>
                <p class="text-muted small mb-4">
                    Warning: This action cannot be undone and will remove all associated photos.
                </p>

                <form method="POST">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'album-list' %}" class="btn btn-outline-secondary px-4">Cancel</a>
                        <button type="submit" class="btn btn-danger px-4">Yes, Delete Album</button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>
{% endblock content %}
